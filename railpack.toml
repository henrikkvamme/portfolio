[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
PORT = "3000"

[install]
cmd = "bun install --frozen-lockfile"

[build]
# Build the brand package first (web depends on it), then the web app
cmd = "bun --filter=@henrikkvamme/brand run build && bun --filter=web run build"

[launch]
# Start the TanStack Start node server (Nitro output)
cmd = "node apps/web/.output/server/index.mjs"
port = 3000
