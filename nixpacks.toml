# Nixpacks configuration for the TanStack Start web app
[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[phases.setup]
nixPkgs = ["bun", "nodejs"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
# Build the brand package first (web depends on it), then the web app
cmds = [
  "bun --filter=@henrikkvamme/brand run build",
  "bun --filter=web run build",
]

[start]
cmd = "node apps/web/.output/server/index.mjs"
